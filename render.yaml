# Render Blueprint — deploys MyLokalEvent as a free web service.
# How to use:
#   1. Push this repo to GitHub.
#   2. On render.com -> New -> Blueprint -> connect the repo.
#   3. Render reads this file. Fill the env vars marked sync:false in the dashboard.
#   4. Set BASE_URL to the URL Render assigns (e.g. https://mylokalevent.onrender.com).
services:
  - type: web
    name: mylokalevent
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: JWT_SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: SUPABASE_URL
        sync: false                  # paste in dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
      - key: BASE_URL
        value: https://mylokalevent.onrender.com
      - key: CORS_ORIGINS
        # Vercel frontend origin + the Render URL itself. No spaces, no trailing slashes.
        value: https://mylokalevent.vercel.app,https://mylokalevent.onrender.com
      # Email + weather live. Payments via Stripe once STRIPE_SECRET_KEY is set
      # (leave MOCK_PAYMENTS=true to auto-approve without Stripe).
      - key: MOCK_PAYMENTS
        value: "false"
      - key: MOCK_EMAIL
        value: "false"
      - key: MOCK_WEATHER
        value: "false"
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false                  # paste your sk_test_... key in the dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false                  # optional: whsec_... from the webhook you create
      - key: PAYMENT_CURRENCY
        value: myr
      - key: FRONTEND_URL
        value: https://mylokalevent.vercel.app
      - key: SENDGRID_API_KEY
        sync: false                  # paste your SG. key in the dashboard
      - key: SENDGRID_FROM_EMAIL
        value: xymeraxy@gmail.com     # your verified SendGrid sender
      - key: SENDGRID_FROM_NAME
        value: MyLokalEvent
      - key: OPENWEATHER_API_KEY
        sync: false                  # paste your OpenWeatherMap key
